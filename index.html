<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Icon Maker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Extension Template Maker</h1>
        <p>Drop an image to generate icons and a ready-to-use Chrome Extension ZIP.</p>
        
        <div id="drop-zone" class="drop-zone">
            <span>Drag & Drop or Click to Upload</span>
            <input type="file" id="file-input" accept="image/*" hidden>
        </div>

        <button id="download-zip" class="zip-btn" style="display: none;">Download Extension Template (.zip)</button>

        <div id="output-container" class="output-grid"></div>

        <div class="footer">
            <a href="https://www.buymeacoffee.com/inartaly" target="_blank" class="bmc-button">
                <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee">
            </a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
